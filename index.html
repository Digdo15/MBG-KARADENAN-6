<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBG Karadenan 6 - Interactive Mobile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1E3A8A;
            --accent: #3B82F6;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #eee; }

        header {
            background: var(--white);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand img { height: 30px; }
        .brand h1 { font-size: 1rem; color: var(--primary); font-weight: 800; }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* Floating Button untuk Buka List di Mobile */
        .toggle-list-btn {
            position: absolute;
            bottom: 25px;
            right: 20px;
            z-index: 1050;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: block;
        }

        /* Bottom Sheet / Sidebar List */
        aside {
            position: fixed;
            bottom: -100%; /* Sembunyi di bawah */
            left: 0; right: 0;
            background: var(--white);
            z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px 20px 0 0;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
        }

        aside.active { bottom: 0; }

        .list-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .close-btn {
            background: #f0f0f0;
            border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            font-weight: 800;
            cursor: pointer;
        }

        .scroll-area { padding: 15px; overflow-y: auto; }

        .location-card {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .location-card strong { color: var(--primary); font-size: 0.9rem; display: block; }
        .tag-group { display: flex; gap: 5px; margin-top: 8px; }
        .tag { font-size: 0.65rem; padding: 3px 7px; background: var(--accent); color: white; border-radius: 5px; font-weight: 600; }

        /* Tablet/Desktop View */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            header { position: absolute; top: 15px; left: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
            .toggle-list-btn { display: none; }
            aside {
                position: relative; bottom: 0; left: 0;
                width: 350px; height: 100vh; max-height: none;
                border-radius: 0; border-right: 1px solid #ddd;
            }
            .close-btn { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <img src="https://lh3.googleusercontent.com/d/1RET3S2WltatRYTWwjfcKVRI5R_xPR1_k" alt="Logo">
        <h1>MBG KARADENAN 6</h1>
    </div>
</header>

<div id="map"></div>

<button class="toggle-list-btn" onclick="toggleList()">📋 Lihat Daftar</button>

<aside id="bottomSheet">
    <div class="list-header">
        <h2 style="font-size: 1rem; color: #666;">DAFTAR DISTRIBUSI</h2>
        <button class="close-btn" onclick="toggleList()">✕</button>
    </div>
    <div class="scroll-area" id="location-list"></div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([-6.505, 106.810], 14);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri Satellite'
    }).addTo(map);

    // Data Sumber
    const dataMBG = [
        { nama: "Bilal bin Rabah", lat: -6.498867, lng: 106.815814, p: 100, pb: 43, pk: 57 },
        { nama: "SD Tanbihul Ghofilin", lat: -6.500194, lng: 106.802939, p: 185, pb: 161, pk: 24 },
        { nama: "MTS & MA Tanbihul", lat: -6.500194, lng: 106.802939, p: 116, pb: 116, pk: 0 },
        { nama: "SMK Migas", lat: -6.523475, lng: 106.806594, p: 37, pb: 37, pk: 0 },
    ];

    const markerGroup = L.featureGroup().addTo(map);

    dataMBG.forEach((loc) => {
        const marker = L.marker([loc.lat, loc.lng]).addTo(markerGroup);
        marker.bindPopup(`<b>${loc.nama}</b><br>${loc.p} Porsi`);

        const list = document.getElementById('location-list');
        const card = document.createElement('div');
        card.className = 'location-card';
        card.innerHTML = `
            <strong>${loc.nama}</strong>
            <div class="tag-group">
                <span class="tag">📦 ${loc.p}</span>
                <span class="tag">🔵 ${loc.pb}</span>
                <span class="tag">⚪ ${loc.pk}</span>
            </div>
        `;
        
        card.onclick = () => {
            map.flyTo([loc.lat, loc.lng], 18);
            marker.openPopup();
            if (window.innerWidth < 768) toggleList(); // Tutup list setelah klik di mobile
        };
        list.appendChild(card);
    });

    // Otomatis atur boundary (fitBounds) berdasarkan semua titik
    map.fitBounds(markerGroup.getBounds(), { padding: [50, 50] });

    function toggleList() {
        document.getElementById('bottomSheet').classList.toggle('active');
    }

    // GPS Posisi
    map.locate({setView: false, watch: true});
    map.on('locationfound', (e) => {
        L.circleMarker(e.latlng, { radius: 6, color: '#3B82F6', fillOpacity: 1 }).addTo(map);
    });
</script>
</body>
</html>
