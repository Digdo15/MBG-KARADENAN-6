<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBG Karadenan 6 - Mobile Simple</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="brand">
        <img src="https://lh3.googleusercontent.com/d/1RET3S2WltatRYTWwjfcKVRI5R_xPR1_k" alt="Logo">
        <span>MBG KARADENAN 6</span>
    </div>
</header>

<div id="map"></div>

<!-- Daftar Lokasi Simpel (Horizontal di Mobile) -->
<div class="bottom-nav">
    <div id="location-list" class="scroll-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([-6.505, 106.810], 14);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri Satellite'
    }).addTo(map);

    // Data dari sumber utama
    const dataMBG = [
        { nama: "Bilal bin Rabah", lat: -6.498867, lng: 106.815814, p: 100, pb: 43, pk: 57 },[cite: 1, 2]
        { nama: "SD Tanbihul Ghofilin", lat: -6.500194, lng: 106.802939, p: 185, pb: 161, pk: 24 },[cite: 1, 2]
        { nama: "MTS/MA Tanbihul", lat: -6.500194, lng: 106.802939, p: 116, pb: 116, pk: 0 },[cite: 2]
        { nama: "SMK Migas", lat: -6.523475, lng: 106.806594, p: 37, pb: 37, pk: 0 }[cite: 1, 2]
    ];

    dataMBG.forEach((loc) => {
        const marker = L.marker([loc.lat, loc.lng]).addTo(map);
        marker.bindPopup(`<b>${loc.nama}</b><br>Total: ${loc.p} Porsi`);[cite: 2]

        const list = document.getElementById('location-list');
        const card = document.createElement('div');
        card.className = 'mini-card';
        card.innerHTML = `
            <strong>${loc.nama}</strong>
            <div class="stats">📦 ${loc.p} | 🔵 ${loc.pb} | ⚪ ${loc.pk}</div>
        `;
        
        card.onclick = () => {
            map.flyTo([loc.lat, loc.lng], 18);
            marker.openPopup();
        };
        list.appendChild(card);
    });

    map.locate({setView: false, watch: true});
    map.on('locationfound', (e) => {
        L.circleMarker(e.latlng, { radius: 6, color: '#3B82F6', fillOpacity: 1 }).addTo(map);
    });
</script>
</body>
</html>
