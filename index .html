<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG Karadenan 6 - Sistem Distribusi</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        :root {
            --primary-color: #2E7D32; /* Hijau segar untuk tema makanan/MBG */
            --bg-color: #f4f6f8;
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); }

        /* Navbar */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        header h1 { font-size: 1.5rem; }

        /* Container & Layout */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        /* Control Panel */
        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .panel h2 { margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Map Area */
        .map-container {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        #map { height: 70vh; width: 100%; border-radius: 8px; z-index: 1; }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍱 MBG Karadenan 6</h1>
        <div>Hub Distribusi Terpadu</div>
    </header>

    <div class="container">
        <!-- Panel Kontrol -->
        <div class="panel">
            <h2>Kontrol Rute Live</h2>
            
            <div class="form-group">
                <label for="destination">Pilih Titik Distribusi:</label>
                <select id="destination">
                    <option value="">-- Pilih Lokasi Tujuan --</option>
                    <option value="-6.498867,106.815814">Masjid Bilal bin Rabah</option>
                    <option value="-6.500194,106.802939">SD Tanbihul Ghofilin</option>
                    <option value="-6.523475,106.806594">SMK Migas</option>
                </select>
            </div>

            <div class="status-box" id="status-text">
                <strong>Status GPS:</strong> Menunggu izin lokasi...
            </div>
            
            <p style="margin-top: 15px; font-size: 0.85rem; color: #666;">
                *Pastikan GPS perangkat Anda aktif untuk menggunakan fitur rute otomatis.
            </p>
        </div>

        <!-- Peta -->
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Tim Distribusi MBG Karadenan 6. All rights reserved.
    </footer>

    <!-- Leaflet & Routing Machine JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // Inisialisasi Peta Awal (Bogor Area)
        const map = L.map('map').setView([-6.505, 106.810], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let userLocation = null;
        let routingControl = null;
        let userMarker = null;

        const statusText = document.getElementById('status-text');
        const destinationSelect = document.getElementById('destination');

        // Meminta lokasi pengguna (Live GPS)
        map.locate({setView: true, watch: true, enableHighAccuracy: true, maxZoom: 16});

        // Jika GPS berhasil didapatkan
        map.on('locationfound', function(e) {
            userLocation = e.latlng;
            statusText.innerHTML = "<strong>Status GPS:</strong> Lokasi Anda ditemukan. Silakan pilih tujuan.";
            statusText.style.backgroundColor = "#e8f5e9";
            
            // Tambahkan/Update marker posisi Anda
            if(userMarker) {
                userMarker.setLatLng(userLocation);
            } else {
                userMarker = L.circleMarker(userLocation, {
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.5,
                    radius: 8
                }).addTo(map).bindPopup("Posisi Anda Saat Ini").openPopup();
            }

            // Jika sedang ada rute berjalan, update titik awalnya secara live
            if (routingControl && destinationSelect.value !== "") {
                const destCoords = destinationSelect.value.split(',');
                const destLatLng = L.latLng(destCoords[0], destCoords[1]);
                routingControl.setWaypoints([userLocation, destLatLng]);
            }
        });

        // Jika GPS gagal/ditolak
        map.on('locationerror', function(e) {
            statusText.innerHTML = "<strong>Status GPS:</strong> Gagal mendapatkan lokasi. Pastikan GPS aktif dan izin diberikan.";
            statusText.style.backgroundColor = "#ffebee";
            statusText.style.borderLeftColor = "red";
        });

        // Event saat Dropdown Tujuan Diubah
        destinationSelect.addEventListener('change', function() {
            const selectedValue = this.value;

            if (!userLocation) {
                alert("Sistem belum menemukan lokasi GPS Anda. Tunggu sebentar atau pastikan GPS menyala.");
                this.value = ""; // Reset dropdown
                return;
            }

            if (selectedValue === "") {
                // Hapus rute jika pilih "Pilih Lokasi"
                if (routingControl) {
                    map.removeControl(routingControl);
                    routingControl = null;
                }
                map.setView(userLocation, 15);
                return;
            }

            // Ambil koordinat dari value dropdown
            const coords = selectedValue.split(',');
            const destLatLng = L.latLng(coords[0], coords[1]); // Koordinat dari file sumber[cite: 1]

            // Hapus rute lama jika ada
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // Buat Rute Baru dari Posisi Live ke Tujuan
            routingControl = L.Routing.control({
                waypoints: [
                    userLocation,
                    destLatLng
                ],
                routeWhileDragging: false,
                language: 'id',
                lineOptions: {
                    styles: [{color: '#2E7D32', opacity: 0.8, weight: 6}]
                },
                createMarker: function(i, waypoint, n) {
                    // Custom popup text untuk marker
                    let text = (i === 0) ? "Lokasi Anda" : destinationSelect.options[destinationSelect.selectedIndex].text;
                    return L.marker(waypoint.latLng).bindPopup(text);
                }
            }).addTo(map);
        });

    </script>
</body>
</html>
